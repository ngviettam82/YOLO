# YOLO11 Training Configuration
# Optimized for AERIAL FIRE & SMOKE DETECTION (Drone @ 100m, small objects)

# Model Selection
# Options: yolo11n.pt (nano), yolo11s.pt (small), yolo11m.pt (medium), 
#          yolo11l.pt (large), yolo11x.pt (xlarge)
# yolo11m.pt recommended for drone fire detection (good accuracy, reasonable VRAM)
model: yolo11m.pt

# Image size (pixels)
# CRITICAL for small object detection from drones
# 1280 = native drone resolution, preserves small fire/smoke details
# At 640, a 14-pixel fire becomes ~7 pixels — undetectable
# At 1280, small objects retain enough pixels for detection
image_size: 1280

# Batch size (adjust based on your GPU VRAM)
# With imgsz=1280, VRAM usage is ~4x higher than 640
# RTX 5080 (16GB): 4-8 recommended at 1280
# RTX 4090 (24GB): 8-12 recommended at 1280
# RTX 4070 Ti Super (16GB): 4 recommended at 1280
# RTX 4060 Ti (8GB): 2 recommended at 1280
batch_size: 4

# Training epochs
epochs: 800

# Data loading workers
workers: 12

# Early stopping patience
patience: 120

# Learning rate settings (tuned for small object detection)
lr0: 0.001             # Initial learning rate
lrf: 0.0001            # Final learning rate

# Augmentation settings (optimized for aerial fire/smoke detection)
mosaic: 1.0            # Mosaic - combines 4 images, helps small objects appear in varied contexts
mixup: 0.15            # MixUp augmentation
copy_paste: 0.4        # Copy-paste augmentation - duplicates small fire/smoke objects
degrees: 180.0         # Full rotation - drone can approach fire from any angle
translate: 0.2         # Translation augmentation
scale: 0.9             # Scale augmentation - simulates altitude variation (70m-150m)
flipud: 0.5            # Vertical flip - aerial view has no fixed orientation
fliplr: 0.5            # Horizontal flip

# HSV augmentation (tuned for fire/smoke color variation)
hsv_h: 0.02            # Hue - fire can be orange/red/yellow
hsv_s: 0.8             # Saturation - smoke varies from gray to dark
hsv_v: 0.5             # Brightness - varies with lighting/time of day

# GPU memory settings
fraction: 0.95         # Use 95% of GPU memory
amp: true              # Automatic Mixed Precision (FP16)
